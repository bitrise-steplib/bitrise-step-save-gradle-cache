format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  test_gradle:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-Android-Sample
    - BRANCH: main
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
    - android-build:
        inputs:
        - module: app
        - variant: debug
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"
        - save_transforms: "true"
    - script:
        title: Delete local Gradle caches
        inputs:
        - content: |-
            set -ex
            ./gradlew -stop
            sudo chown -R $USER:$GROUP ~/.gradle
            sudo rm -rf ./_tmp/.gradle
            ls -la ~/.gradle
            sudo rm -rf ~/.gradle
    - restore-cache:
        run_if: "true"
        is_skippable: false
        inputs:
        - key: "{{ .OS }}-{{ .Arch }}-gradle-cache-"
        - verbose: "true"
    - script:
        title: Verify restored folder
        inputs:
        - content: |-
            set -ex
            if [ ! -d ~/.gradle/caches ]; then
              echo "~/.gradle/caches directory doesn't exist"
              exit 1
            fi
            if [ ! -d ~/.gradle/wrapper ]; then
              echo "~/.gradle/wrapper directory doesn't exist"
              exit 1
            fi
    - android-build:
        title: Build app again
        inputs:
        - module: app
        - variant: debug

  test_empty:
    description: |
      Tests the case when there is nothing to compress based on the cache paths. The step returns early in this case
      with a 0 exit code
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
        - is_create_path: true
    - script:
        title: Clean Gradle caches
        inputs:
        - content: |-
            set -ex
            ./gradlew -stop
            sudo chown -R $USER:$GROUP ~/.gradle
            sudo rm -rf ~/.gradle
            sudo rm -rf ./_tmp/.gradle
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"

  _setup:
    steps:
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $BRANCH
